<div class="card h-100 place-card border-0">
  <div class="position-relative overflow-hidden" style="height:210px;">
    <img [src]="place.imageUrl" [alt]="place.name"
      class="w-100 h-100 object-fit-cover"
      onerror="this.src='https://placehold.co/400x210/1C3557/ffffff?text=Bihar+Tourism'" />
    <div class="position-absolute inset-0 w-100 h-100"
      style="background:linear-gradient(to top, rgba(15,30,51,0.55) 0%, transparent 60%);"></div>
    <span class="position-absolute top-0 end-0 m-2 badge-category" [ngClass]="categoryBadgeClass()">
      {{ place.category }}
    </span>
    <button *ngIf="loggedIn" class="fav-btn position-absolute top-0 start-0 m-2"
      (click)="toggleFavorite($event)" [disabled]="favLoading"
      [title]="isFavorite ? 'Remove from favorites' : 'Add to favorites'">
      <i class="bi" [ngClass]="isFavorite ? 'bi-heart-fill' : 'bi-heart'"
        [style.color]="isFavorite ? '#ef4444' : '#fff'"></i>
    </button>
  </div>
  <div class="card-body d-flex flex-column p-4">
    <h5 class="card-title fw-bold mb-1" style="font-family:'Playfair Display',serif; font-size:1.05rem;">
      {{ place.name }}
    </h5>
    <p class="mb-3" style="color:var(--accent); font-size:0.8rem; font-weight:600;">
      <i class="bi bi-geo-alt me-1"></i>{{ place.district }} District
    </p>
    <p class="card-text flex-grow-1" style="color:var(--text-muted); font-size:0.875rem; line-height:1.6;">
      {{ place.description | slice:0:100 }}{{ place.description.length > 100 ? '...' : '' }}
    </p>
    <a [routerLink]="['/place', place.id]" class="btn btn-detail mt-3 d-flex align-items-center justify-content-center gap-2">
      <span>View Details</span>
      <i class="bi bi-arrow-right"></i>
    </a>
  </div>
</div>

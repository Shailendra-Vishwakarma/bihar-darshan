<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-map me-2"></i>Tourist Places</h2>
    <p>Explore amazing destinations across Bihar</p>
  </div>
</div>

<div class="container py-5">
  <!-- Filter Bar -->
  <div class="filter-bar card border-0 p-4 mb-5">
    <div class="row g-3 align-items-center">
      <div class="col-md-5">
        <app-search-bar (search)="onSearch($event)"></app-search-bar>
      </div>
      <div class="col-md-7">
        <app-category-filter (categoryChange)="onCategoryChange($event)"></app-category-filter>
      </div>
    </div>
  </div>

  <!-- Result count -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <p class="mb-0" style="color:var(--text-muted); font-size:0.875rem;">
      Showing <strong style="color:var(--text-dark);">{{ places.length }}</strong> places
      <span *ngIf="selectedCategory !== 'All'"> in <strong style="color:var(--primary);">{{ selectedCategory }}</strong></span>
      <span *ngIf="searchKeyword"> matching "<strong style="color:var(--primary);">{{ searchKeyword }}</strong>"</span>
    </p>
  </div>

  <!-- Grid -->
  <div class="row g-4" *ngIf="places.length > 0; else noResults">
    <div class="col-sm-6 col-lg-4" *ngFor="let place of places">
      <app-place-card [place]="place"></app-place-card>
    </div>
  </div>

  <ng-template #noResults>
    <div class="text-center py-5">
      <i class="bi bi-search display-1" style="color:var(--border);"></i>
      <h4 class="mt-4" style="color:var(--text-muted);">No places found</h4>
      <p style="color:var(--text-muted);">Try a different keyword or category.</p>
    </div>
  </ng-template>
</div>

<div class="auth-page">
  <div class="container">
    <div class="auth-card card border-0 shadow-lg mx-auto">
      <div class="auth-header">
        <i class="bi bi-geo-alt-fill text-accent fs-3"></i>
        <h2 class="mt-2">Welcome Back</h2>
        <p>Sign in to access your favorites and reviews</p>
      </div>

      <div class="card-body p-4">
        <div class="alert alert-danger border-0 rounded-3" *ngIf="error">{{ error }}</div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" class="form-control" formControlName="email" placeholder="you@example.com"
              [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" formControlName="password" placeholder="••••••••"
              [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
            <div class="invalid-feedback">Password is required.</div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Sign In
          </button>
        </form>

        <p class="text-center mt-4 mb-0" style="color:var(--text-muted); font-size:0.875rem;">
          Don't have an account?
          <a routerLink="/register" style="color:var(--primary); font-weight:600;">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="auth-page">
  <div class="container">
    <div class="auth-card card border-0 shadow-lg mx-auto">
      <div class="auth-header">
        <i class="bi bi-person-plus-fill text-accent fs-3"></i>
        <h2 class="mt-2">Create Account</h2>
        <p>Join Bihar Darshan to save favorites and write reviews</p>
      </div>

      <div class="card-body p-4">
        <div class="alert alert-danger border-0 rounded-3" *ngIf="error">{{ error }}</div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" formControlName="username" placeholder="e.g. rahul_kumar"
              [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched">
            <div class="invalid-feedback">Username must be at least 3 characters.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" class="form-control" formControlName="email" placeholder="you@example.com"
              [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" formControlName="password" placeholder="Min. 6 characters"
              [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Create Account
          </button>
        </form>

        <p class="text-center mt-4 mb-0" style="color:var(--text-muted); font-size:0.875rem;">
          Already have an account?
          <a routerLink="/login" style="color:var(--primary); font-weight:600;">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
